# Base para autenticação e usuários do sistema
type Users @table(key: "uid") {
  uid: String!
  email: String
  displayName: String
  photoURL: String
  disabled: Boolean! @field(default: "false")
  createdAt: Timestamp! @field(default: "now()")
  updatedAt: Timestamp! @field(default: "now()")
  # Relações
  roles: [UserRoles]
  assignedDeals: [Deals]
  approvedQuotes: [Quotes]
  approvedReservations: [Reservations]
}

type Roles @table(key: "roleId") {
  roleId: ID!
  name: String! # ex: admin, agent, viewer
  permissions: JSON
  users: [UserRoles]
}

type UserRoles @table(key: "userRoleId") {
  userRoleId: ID!
  user: Users! @foreignKey(references: "uid")
  role: Roles! @foreignKey(references: "roleId")
}

# Entidade central para clientes
type Contacts @table(key: "contactId") {
  contactId: ID!
  fullName: String!
  phone: String
  email: String
  avatarUrl: String
  originChannel: String # ex: whatsapp, instagram, web
  notes: String
  status: String # ex: active, archived
  createdAt: Timestamp! @field(default: "now()")
  updatedAt: Timestamp! @field(default: "now()")
  # Relações
  deals: [Deals]
  conversations: [Conversations]
}

# Oportunidades de negócio / Vendas
enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  AWAITING_ACTION
  CLOSED_WON
  CLOSED_LOST
}

type Deals @table(key: "dealId") {
  dealId: ID!
  title: String!
  contact: Contacts! @foreignKey(references: "contactId")
  stage: DealStage! @field(default: "NEW_LEAD")
  estimatedValue: Float
  nextAction: String
  assignedTo: Users @foreignKey(references: "uid")
  createdAt: Timestamp! @field(default: "now()")
  updatedAt: Timestamp! @field(default: "now()")
  # Relações
  quote: Quotes
}

# Conversas com clientes
type Conversations @table(key: "conversationId") {
  conversationId: ID!
  contact: Contacts! @foreignKey(references: "contactId")
  channelId: String! # Referência ao canal (ex: channel_wa)
  status: String! @field(default: "open") # open, closed, pending
  isAiActive: Boolean! @field(default: "true")
  humanOwner: Users @foreignKey(references: "uid")
  lastMessageAt: Timestamp
  createdAt: Timestamp! @field(default: "now()")
  # Relações
  messages: [Messages]
}

type Messages @table(key: "messageId") {
  messageId: ID!
  conversation: Conversations! @foreignKey(references: "conversationId")
  senderType: String! # user, agent, ai, system
  authorName: String
  content: String!
  contentType: String! @field(default: "text") # text, image
  createdAt: Timestamp! @field(default: "now()")
}

# Orçamentos gerados
enum QuoteStatus {
  DRAFT
  REVIEW
  SENT
  APPROVED
  REJECTED
  CANCELED
}

type Quotes @table(key: "quoteId") {
  quoteId: ID!
  deal: Deals! @foreignKey(references: "dealId")
  status: QuoteStatus! @field(default: "DRAFT")
  summary: String
  origin: String
  destination: String
  serviceDate: Timestamp
  passengers: Int
  aiSuggestedValue: Float
  finalValue: Float
  approvedBy: Users @foreignKey(references: "uid")
  createdAt: Timestamp! @field(default: "now()")
  updatedAt: Timestamp! @field(default: "now()")
  # Relações
  reservation: Reservations
}

# Reservas confirmadas
enum ReservationStatus {
  PENDING
  CONFIRMED
  COMPLETED
  CANCELED
  RESCHEDULED
}

type Reservations @table(key: "reservationId") {
  reservationId: ID!
  quote: Quotes! @foreignKey(references: "quoteId")
  status: ReservationStatus! @field(default: "PENDING")
  serviceDate: Timestamp!
  details: String
  confirmedBy: Users @foreignKey(references: "uid")
  createdAt: Timestamp! @field(default: "now()")
  updatedAt: Timestamp! @field(default: "now()")
  # Relações
  calendarEvent: CalendarEvents
}

# Eventos no calendário
type CalendarEvents @table(key: "eventId") {
  eventId: ID!
  reservation: Reservations @foreignKey(references: "reservationId")
  title: String!
  eventType: String! # Pickup, Transfer, Tour
  start: Timestamp!
  end: Timestamp!
  assignedTo: Users @foreignKey(references: "uid")
  status: String! @field(default: "CONFIRMED") # CONFIRMED, CANCELED
  createdAt: Timestamp! @field(default: "now()")
}

# Tarefas e Follow-ups
type Tasks @table(key: "taskId") {
  taskId: ID!
  title: String!
  description: String
  dueDate: Timestamp
  isCompleted: Boolean! @field(default: "false")
  assignedTo: Users @foreignKey(references: "uid")
  relatedDeal: Deals @foreignKey(references: "dealId")
  relatedContact: Contacts @foreignKey(references: "contactId")
  createdAt: Timestamp! @field(default: "now()")
}

# Logs de auditoria para rastrear ações
type AuditLogs @table(key: "logId") {
  logId: ID!
  actor: String! # Quem fez a ação (ex: User UID, "AI", "System")
  actorType: String! # human, ai, system
  eventType: String! # ex: deal_stage_changed, quote_created
  entityType: String! # Deals, Quotes, etc.
  entityId: String!
  before: JSON
  after: JSON
  notes: String
  source: String # app, whatsapp, ai_flow
  createdAt: Timestamp! @field(default: "now()")
}

# Base de Conhecimento
type KnowledgeBaseArticles @table(key: "articleId") {
  articleId: ID!
  title: String!
  category: String! # Services, Destinations, Policies
  summary: String
  content: String!
  status: String! @field(default: "DRAFT") # DRAFT, REVIEWED, PUBLISHED
  isEligibleForAI: Boolean! @field(default: "false")
  createdAt: Timestamp! @field(default: "now()")
  updatedAt: Timestamp! @field(default: "now()")
}

# Configurações globais da IA
type AISettings @table(key: "id") {
  id: ID!
  mode: String! @field(default: "ASSISTED") # OFF, ASSISTED, AUTONOMOUS
  commercialActivationStatus: String! @field(default: "UNAUTHORIZED")
  manualFinalizationRequired: Boolean! @field(default: "true")
  activeProvider: String! @field(default: "AUTOMATIC") # AUTOMATIC, GEMINI, OPENAI
  isFallbackEnabled: Boolean! @field(default: "true")
  updatedAt: Timestamp! @field(default: "now()")
}

# Canais de comunicação (WhatsApp, Instagram, etc)
type ChannelConnections @table(key: "channelId") {
  channelId: ID!
  type: String! # WHATSAPP, INSTAGRAM, FACEBOOK, WEBSITE
  name: String!
  status: String! @field(default: "NOT_CONFIGURED") # CONNECTED, DISCONNECTED, FAILING, MOCK
  aiEnabled: Boolean! @field(default: "true")
  provider: String! @field(default: "AUTOMATIC")
  lastChecked: Timestamp
  lastError: String
  updatedAt: Timestamp! @field(default: "now()")
}
