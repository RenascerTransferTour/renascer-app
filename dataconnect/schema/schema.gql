
"""
Represents a user in the system, typically linked to Firebase Authentication.
"""
type Users @table(key: "userId") {
  userId: ID!
  uid: String! @unique # Firebase Auth UID
  fullName: String!
  email: String! @unique
  avatarUrl: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  roles: [UserRoles] @join(on: "userId")
}

"""
Defines the roles available in the system (e.g., admin, agent).
"""
type Roles @table(key: "roleId") {
  roleId: ID!
  roleName: String! @unique # e.g., 'admin', 'agent'
  description: String
}

"""
Junction table to link users with their roles (many-to-many).
"""
type UserRoles @table(key: ["userId", "roleId"]) {
  userId: ID!
  roleId: ID!
  user: Users! @join(on: "userId")
  role: Roles! @join(on: "roleId")
}

"""
Represents an external contact or customer.
"""
type Contacts @table(key: "contactId") {
  contactId: ID!
  fullName: String!
  phone: String
  email: String
  avatarUrl: String
  originChannel: String
  notes: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  deals: [Deals] @join(on: "contactId")
  conversations: [Conversations] @join(on: "contactId")
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  AWAITING_CLOSURE
  CLOSED_WON
  CLOSED_LOST
}

"""
Represents a sales lead or deal in the pipeline.
"""
type Deals @table(key: "dealId") {
  dealId: ID!
  contactId: ID!
  contact: Contacts! @join(on: "contactId")
  title: String!
  stage: DealStage!
  estimatedValue: Float
  assignedToUserId: ID
  assignedTo: Users @join(on: "assignedToUserId")
  nextAction: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  quote: Quotes @join(on: "dealId")
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING_HUMAN
  ASSISTED_BY_AI
}

"""
A single conversation thread with a contact.
"""
type Conversations @table(key: "conversationId") {
  conversationId: ID!
  contactId: ID!
  contact: Contacts! @join(on: "contactId")
  channelId: String! # From channel_connections
  status: ConversationStatus!
  humanOwnerId: ID
  owner: Users @join(on: "humanOwnerId")
  lastMessageSnippet: String
  lastMessageAt: Timestamp
  createdAt: Timestamp!
  updatedAt: Timestamp!
  messages: [Messages] @join(on: "conversationId")
}

enum MessageSenderType {
  USER
  AGENT
  AI
  SYSTEM
}

"""
An individual message within a conversation.
"""
type Messages @table(key: "messageId") {
  messageId: ID!
  conversationId: ID!
  conversation: Conversations! @join(on: "conversationId")
  senderType: MessageSenderType!
  senderName: String # e.g., 'Ana Silva' or 'Cláudia Vaz' or 'Assistente IA'
  content: String!
  createdAt: Timestamp!
}

enum QuoteStatus {
  DRAFT
  SENT
  APPROVED
  REJECTED
  EXPIRED
}

"""
A price quote for a service.
"""
type Quotes @table(key: "quoteId") {
  quoteId: ID!
  dealId: ID!
  deal: Deals! @join(on: "dealId")
  status: QuoteStatus!
  origin: String
  destination: String
  serviceDate: Timestamp
  passengers: Int
  aiSuggestedValue: Float
  finalApprovedValue: Float
  approvedByUserId: ID
  approvedBy: Users @join(on: "approvedByUserId")
  createdAt: Timestamp!
  updatedAt: Timestamp!
  reservation: Reservations @join(on: "quoteId")
}

enum ReservationStatus {
  PENDING_CONFIRMATION
  CONFIRMED
  COMPLETED
  CANCELED
  RESCHEDULED
}

"""
A confirmed or pending service reservation.
"""
type Reservations @table(key: "reservationId") {
  reservationId: ID!
  quoteId: ID!
  quote: Quotes! @join(on: "quoteId")
  status: ReservationStatus!
  confirmedByUserId: ID
  confirmedBy: Users @join(on: "confirmedByUserId")
  serviceDate: Timestamp!
  notes: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  calendarEvent: CalendarEvents @join(on: "reservationId")
}

"""
An event to be displayed on the calendar.
"""
type CalendarEvents @table(key: "eventId") {
  eventId: ID!
  reservationId: ID
  reservation: Reservations @join(on: "reservationId")
  title: String!
  start: Timestamp!
  end: Timestamp!
  assignedToUserId: ID
  assignedTo: Users @join(on: "assignedToUserId")
  isAllDay: Boolean
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

enum ActorType {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

"""
Logs important actions taken in the system for auditing purposes.
"""
type AuditLogs @table(key: "logId") {
  logId: ID!
  timestamp: Timestamp!
  actorType: ActorType!
  actorName: String!
  eventType: String!
  entityType: String
  entityId: String
  notes: String
  source: String
  beforeState: JSON
  afterState: JSON
}

enum ArticleStatus {
  DRAFT
  REVIEWED
  PUBLISHED
  ARCHIVED
}

"""
Articles for the internal knowledge base.
"""
type KnowledgeBaseArticles @table(key: "articleId") {
  articleId: ID!
  title: String!
  category: String!
  summary: String
  content: String!
  status: ArticleStatus!
  isEligibleForAI: Boolean!
  authorId: ID!
  author: Users! @join(on: "authorId")
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

enum AIMode {
  OFF
  ASSISTED
  SEMI_AUTONOMOUS
}

enum ActivationStatus {
  AUTHORIZED
  UNAUTHORIZED
}

"""
Global settings for AI behavior.
"""
type AISettings @table(key: "settingsId") {
  settingsId: ID! # Should be a singleton row
  mode: AIMode!
  manualFinalizationRequired: Boolean!
  primaryProvider: String # e.g., 'gemini', 'openai'
  fallbackProvider: String
  isFallbackEnabled: Boolean!
}

"""
Keys to enable/disable major commercial features.
"""
type ActivationKeys @table(key: "keyId") {
  keyId: ID!
  featureName: String! @unique # e.g., 'COMMERCIAL_AUTOMATION'
  status: ActivationStatus!
  description: String
  updatedAt: Timestamp!
}

"""
Represents a specific account on a communication channel (e.g., a WhatsApp number).
"""
type ChannelAccounts @table(key: "accountId") {
  accountId: ID!
  channelType: String! # e.g., 'whatsapp', 'instagram'
  accountIdentifier: String! # e.g., a phone number or page ID
  displayName: String
  createdAt: Timestamp!
}

enum ConnectionStatus {
  CONNECTED
  DISCONNECTED
  AWAITING_AUTH
  ERROR
  MOCK
}

"""
Represents the connection status and configuration for a channel account.
"""
type ChannelConnections @table(key: "connectionId") {
  connectionId: ID!
  accountId: ID!
  account: ChannelAccounts! @join(on: "accountId")
  status: ConnectionStatus!
  lastCheckedAt: Timestamp
  lastError: String
  aiEnabled: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}
