
"""
Represents an article in the knowledge base.
"""
type KnowledgeBaseArticle {
  id: ID!
  category: String
  content: String
  createdAt: Timestamp!
  isEligibleForAI: Boolean
  status: String
  summary: String
  title: String!
  updatedAt: Timestamp!
}

"""
Represents a customer or lead contact.
"""
type Contact {
  id: ID!
  avatar: String
  createdAt: Timestamp!
  email: String
  fullName: String!
  language: String
  phone: String
  updatedAt: Timestamp!
}

"""
Represents a conversation with a contact.
"""
type Conversation {
  id: ID!
  contact: Contact!
  createdAt: Timestamp!
  isAiActive: Boolean
  lastMessage: String
  lastMessageAt: Timestamp
  priority: String
  status: String!
  updatedAt: Timestamp!
}

"""
Represents a sales deal in the CRM pipeline.
"""
type Deal {
  id: ID!
  contact: Contact!
  createdAt: Timestamp!
  estimatedValue: Float
  owner: User
  pipelineStage: String!
  status: String
  title: String!
  updatedAt: Timestamp!
}

"""
Represents a single message within a conversation.
"""
type Message {
  id: ID!
  authorName: String
  content: String!
  conversation: Conversation!
  createdAt: Timestamp!
  senderType: String!
}

"""
Represents a price quote provided to a contact.
"""
type Quote {
  id: ID!
  contact: Contact!
  createdAt: Timestamp!
  priceRange: String
  status: String!
  summary: String!
  updatedAt: Timestamp!
}

"""
Represents a confirmed or pending service reservation.
"""
type Reservation {
  id: ID!
  contact: Contact!
  createdAt: Timestamp!
  details: String
  reservedBy: String
  scheduledDate: Timestamp
  service: String
  status: String!
  updatedAt: Timestamp!
}

"""
Represents an event in the operational calendar.
"""
type CalendarEvent {
  id: ID!
  createdAt: Timestamp!
  end: Timestamp
  eventType: String
  start: Timestamp
  status: String
  title: String!
  updatedAt: Timestamp!
}

"""
Represents a log of actions performed in the system.
"""
type AuditLog {
  id: ID!
  actor: String
  actorType: String
  after: String
  before: String
  channel: String
  contact: Contact
  createdAt: Timestamp!
  entityId: String
  entityType: String
  eventType: String
  notes: String
  source: String
}

"""
Represents an operator or user of the system.
"""
type User {
  id: ID!
  avatar: String
  createdAt: Timestamp!
  email: String!
  fullName: String
  role: String
  updatedAt: Timestamp!
}
