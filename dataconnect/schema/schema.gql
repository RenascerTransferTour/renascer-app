# Defines the GraphQL schema for the Renascer Transfer Tour backend.

# --- Enums for Statuses and Types ---
enum UserRole {
  ADMIN
  AGENT
  VIEWER
}

enum LeadStatus {
  NEW
  QUALIFIED
  CONTACTED
  UNQUALIFIED
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  UNCONFIRMED
  CLOSED_WON
  CLOSED_LOST
  CANCELED
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  AWAITING_HUMAN
}

enum QuoteStatus {
  DRAFT
  REVIEW
  SENT
  APPROVED
  REJECTED
  CANCELED
}

enum ReservationStatus {
  PENDING
  CONFIRMED
  CANCELED
  COMPLETED
}

enum ChannelType {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
}

enum ChannelConnectionStatus {
  CONNECTED
  DISCONNECTED
  PENDING
  AWAITING_QR
  FAILING
}

enum AIMode {
  OFF
  ASSISTED
  AUTONOMOUS
}

# --- Core Tables (Entities) ---

type Users @table(key: "userId") {
  userId: String! @db(default: "uuid()")
  fullName: String!
  email: String! @db(unique: true)
  hashedPassword: String
  avatarUrl: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  roles: [UserRoles!] @db(foreignKey: "userId")
}

type Roles @table(key: "roleId") {
  roleId: String! @db(default: "uuid()")
  roleName: UserRole! @db(unique: true)
  # Relations
  users: [UserRoles!] @db(foreignKey: "roleId")
}

type UserRoles @table(key: ["userId", "roleId"]) {
  userId: String!
  roleId: String!
  # Relations
  user: Users! @db(references: ["userId"])
  role: Roles! @db(references: ["roleId"])
}

type Contacts @table(key: "contactId") {
  contactId: String! @db(default: "uuid()")
  fullName: String!
  phone: String @db(unique: true)
  email: String @db(unique: true)
  avatarUrl: String
  originChannel: String
  notes: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  deals: [Deals!] @db(foreignKey: "contactId")
  conversations: [Conversations!] @db(foreignKey: "contactId")
}

type Deals @table(key: "dealId") {
  dealId: String! @db(default: "uuid()")
  contactId: String!
  title: String!
  stage: DealStage! @db(default: "NEW_LEAD")
  estimatedValue: Float
  nextAction: String
  assignedToId: String # Refers to Users.userId
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  contact: Contacts! @db(references: ["contactId"])
  assignedTo: Users @db(references: ["assignedToId"])
}

type Conversations @table(key: "conversationId") {
  conversationId: String! @db(default: "uuid()")
  contactId: String!
  channelId: String!
  status: ConversationStatus! @db(default: "OPEN")
  assignedToId: String # Refers to Users.userId
  lastMessageSnippet: String
  lastMessageAt: Timestamp
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  contact: Contacts! @db(references: ["contactId"])
  channel: ChannelConnections! @db(references: ["channelId"])
  assignedTo: Users @db(references: ["assignedToId"])
  messages: [Messages!] @db(foreignKey: "conversationId")
}

type Messages @table(key: "messageId") {
  messageId: String! @db(default: "uuid()")
  conversationId: String!
  senderType: String! # "user", "agent", "ai", "system"
  senderId: String # Can be Contact.contactId or Users.userId
  content: String!
  createdAt: Timestamp! @db(default: "now()")
  # Relations
  conversation: Conversations! @db(references: ["conversationId"])
}

type Quotes @table(key: "quoteId") {
  quoteId: String! @db(default: "uuid()")
  dealId: String!
  status: QuoteStatus! @db(default: "DRAFT")
  origin: String
  destination: String
  serviceDate: Timestamp
  passengers: Int
  aiSuggestedValue: Float
  finalApprovedValue: Float
  approvedById: String # Refers to Users.userId
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  deal: Deals! @db(references: ["dealId"])
  approvedBy: Users @db(references: ["approvedById"])
}

type Reservations @table(key: "reservationId") {
  reservationId: String! @db(default: "uuid()")
  quoteId: String!
  status: ReservationStatus! @db(default: "PENDING")
  serviceDate: Timestamp!
  confirmedById: String # Refers to Users.userId
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  quote: Quotes! @db(references: ["quoteId"])
  confirmedBy: Users @db(references: ["confirmedById"])
}

type CalendarEvents @table(key: "eventId") {
  eventId: String! @db(default: "uuid()")
  reservationId: String
  title: String!
  start: Timestamp!
  end: Timestamp!
  assignedToId: String # Refers to Users.userId
  createdAt: Timestamp! @db(default: "now()")
  # Relations
  reservation: Reservations @db(references: ["reservationId"])
  assignedTo: Users @db(references: ["assignedToId"])
}

type AuditLogs @table(key: "logId") {
  logId: String! @db(default: "uuid()")
  actor: String!
  actorType: String! # "human", "ai", "system"
  eventType: String!
  entityType: String!
  entityId: String!
  before: JSON
  after: JSON
  notes: String
  source: String
  createdAt: Timestamp! @db(default: "now()")
}

type KnowledgeBaseArticles @table(key: "articleId") {
  articleId: String! @db(default: "uuid()")
  title: String!
  category: String!
  summary: String
  content: String!
  status: String! @db(default: "DRAFT") # DRAFT, PUBLISHED, ARCHIVED
  isEligibleForAI: Boolean! @db(default: false)
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

# --- Settings and Configuration Tables ---

type AISettings @table(key: "id") {
  id: Int! @db(default: 1)
  mode: AIMode! @db(default: "ASSISTED")
  manualFinalizationRequired: Boolean! @db(default: true)
  # Other settings fields...
  updatedAt: Timestamp! @db(default: "now()")
}

type ActivationKeys @table(key: "keyId") {
  keyId: String! @db(default: "uuid()")
  keyName: String! @db(unique: true) # e.g., "COMMERCIAL_ACTIVATION"
  isActive: Boolean! @db(default: false)
  updatedAt: Timestamp! @db(default: "now()")
}

type ChannelAccounts @table(key: "accountId") {
  accountId: String! @db(default: "uuid()")
  type: ChannelType!
  accountIdentifier: String! # e.g., Phone number for WA, Page ID for FB
  # Relations
  connections: [ChannelConnections!] @db(foreignKey: "accountId")
}

type ChannelConnections @table(key: "connectionId") {
  connectionId: String! @db(default: "uuid()")
  accountId: String!
  status: ChannelConnectionStatus! @db(default: "DISCONNECTED")
  isMock: Boolean! @db(default: true)
  lastChecked: Timestamp
  lastError: String
  updatedAt: Timestamp! @db(default: "now()")
  # Relations
  account: ChannelAccounts! @db(references: ["accountId"])
}
