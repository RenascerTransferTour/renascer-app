# ---------------------------------
# Firebase Data Connect Schema
# Renascer Transfer Tour - Phase 2
# ---------------------------------

# -----------------
# Enums
# -----------------

enum RoleName {
  ADMIN
  AGENT
  VIEWER
}

enum ChannelType {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
  MANUAL
}

enum ChannelStatus {
  NOT_CONFIGURED
  CONNECTED
  DISCONNECTED
  AWAITING_QR
  FAILING
  MOCK
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  AWAITING_CLOSURE
  UNCONFIRMED
  CLOSED_WON
  CLOSED_LOST
  CANCELED
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  AWAITING_HUMAN
}

enum MessageSenderType {
  USER
  AGENT
  AI
  SYSTEM
}

enum QuoteStatus {
  DRAFT
  REVIEW_PENDING
  SENT
  APPROVED
  REJECTED
  CANCELED
}

enum ReservationStatus {
  PENDING_CONFIRMATION
  CONFIRMED
  RESCHEDULED
  COMPLETED
  CANCELED
}

enum CalendarEventType {
  PICKUP
  TRANSFER
  TOUR
  BOOKING
  MAINTENANCE
  FOLLOW_UP
}

enum ActorType {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

enum ArticleStatus {
  DRAFT
  REVIEWED
  PUBLISHED
  ARCHIVED
}

enum AIMode {
  OFF
  ASSISTED
  PARTIAL_AUTONOMOUS
  FULL_AUTONOMOUS
}

enum ActivationKeyStatus {
  ACTIVE
  INACTIVE
  EXPIRED
}

enum ActivationKeyType {
  COMMERCIAL_AUTOMATION
  API_ACCESS
}


# -----------------
# Core Entities
# -----------------

# Represents a user of the system (e.g., an employee)
type Users @table(name: "users") @auth(ops: []) {
  id: ID! @column(name: "user_id", primaryKey: true)
  uid: String! @column(name: "firebase_uid", unique: true) # Firebase Auth UID
  fullName: String!
  email: String! @column(unique: true)
  avatarUrl: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  roles: [UserRoles!]! @relation(field: "id", references: "userId")
}

# Defines roles for access control
type Roles @table(name: "roles") @auth(ops: []) {
  id: ID! @column(name: "role_id", primaryKey: true)
  name: RoleName! @column(unique: true)
  users: [UserRoles!]! @relation(field: "id", references: "roleId")
}

# Join table for many-to-many relationship between Users and Roles
type UserRoles @table(name: "user_roles") @auth(ops: []) {
  userId: ID! @column(name: "user_id")
  roleId: ID! @column(name: "role_id")
  user: Users! @relation(field: "userId", references: "id")
  role: Roles! @relation(field: "roleId", references: "id")
}

# Represents an external customer or lead
type Contacts @table(name: "contacts") @auth(ops: []) {
  id: ID! @column(name: "contact_id", primaryKey: true)
  fullName: String!
  phone: String
  email: String
  avatarUrl: String
  originChannel: ChannelType
  notes: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  deals: [Deals!]! @relation(field: "id", references: "contactId")
  conversations: [Conversations!]! @relation(field: "id", references: "contactId")
}

# Represents a sales opportunity or lead
type Deals @table(name: "deals") @auth(ops: []) {
  id: ID! @column(name: "deal_id", primaryKey: true)
  contactId: ID! @column(name: "contact_id")
  title: String!
  stage: DealStage!
  estimatedValue: Float
  finalValue: Float
  ownerId: ID @column(name: "owner_id") # User who owns the deal
  nextActionDate: Timestamp
  nextActionDescription: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  contact: Contacts! @relation(field: "contactId", references: "id")
  owner: Users @relation(field: "ownerId", references: "id")
  quote: Quotes @relation(field: "id", references: "dealId")
}

# Represents a conversation with a contact
type Conversations @table(name: "conversations") @auth(ops: []) {
  id: ID! @column(name: "conversation_id", primaryKey: true)
  contactId: ID! @column(name: "contact_id")
  channelId: ID! @column(name: "channel_id")
  status: ConversationStatus!
  priority: String # e.g., 'low', 'medium', 'high'
  assignedToId: ID @column(name: "assigned_to_id") # User currently handling it
  createdAt: Timestamp!
  updatedAt: Timestamp!
  contact: Contacts! @relation(field: "contactId", references: "id")
  channel: ChannelConnections! @relation(field: "channelId", references: "id")
  assignedTo: Users @relation(field: "assignedToId", references: "id")
  messages: [Messages!]! @relation(field: "id", references: "conversationId")
}

# Represents a single message in a conversation
type Messages @table(name: "messages") @auth(ops: []) {
  id: ID! @column(name: "message_id", primaryKey: true)
  conversationId: ID! @column(name: "conversation_id")
  senderType: MessageSenderType!
  content: String!
  createdAt: Timestamp!
  conversation: Conversations! @relation(field: "conversationId", references: "id")
}

# Represents a price quote sent to a customer
type Quotes @table(name: "quotes") @auth(ops: []) {
  id: ID! @column(name: "quote_id", primaryKey: true)
  dealId: ID! @column(name: "deal_id", unique: true)
  origin: String
  destination: String
  serviceDate: Timestamp
  passengers: Int
  bags: Int
  aiSuggestedValue: Float
  finalApprovedValue: Float
  status: QuoteStatus!
  notes: String
  approvedById: ID @column(name: "approved_by_id")
  createdAt: Timestamp!
  updatedAt: Timestamp!
  deal: Deals! @relation(field: "dealId", references: "id")
  approvedBy: Users @relation(field: "approvedById", references: "id")
  reservation: Reservations @relation(field: "id", references: "quoteId")
}

# Represents a confirmed booking/reservation
type Reservations @table(name: "reservations") @auth(ops: []) {
  id: ID! @column(name: "reservation_id", primaryKey: true)
  quoteId: ID! @column(name: "quote_id", unique: true)
  status: ReservationStatus!
  serviceDate: Timestamp!
  notes: String
  confirmedById: ID @column(name: "confirmed_by_id")
  createdAt: Timestamp!
  updatedAt: Timestamp!
  quote: Quotes! @relation(field: "quoteId", references: "id")
  confirmedBy: Users @relation(field: "confirmedById", references: "id")
  calendarEvent: CalendarEvents @relation(field: "id", references: "reservationId")
}

# Represents an event in the operational calendar
type CalendarEvents @table(name: "calendar_events") @auth(ops: []) {
  id: ID! @column(name: "event_id", primaryKey: true)
  reservationId: ID @column(name: "reservation_id", unique: true)
  title: String!
  start: Timestamp!
  end: Timestamp!
  eventType: CalendarEventType!
  status: ReservationStatus!
  notes: String
  assignedToId: ID @column(name: "assigned_to_id")
  createdAt: Timestamp!
  updatedAt: Timestamp!
  reservation: Reservations @relation(field: "reservationId", references: "id")
  assignedTo: Users @relation(field: "assignedToId", references: "id")
}

# Logs important actions in the system for auditing
type AuditLogs @table(name: "audit_logs") @auth(ops: []) {
  id: ID! @column(name: "log_id", primaryKey: true)
  actorType: ActorType!
  actorName: String! # UID for user/AI, name for customer
  eventType: String! # e.g., 'deal.stage.changed'
  entityType: String! # e.g., 'Deals'
  entityId: String!
  notes: String
  source: String # e.g., 'app', 'whatsapp', 'ai_flow'
  before: JSON # State before change
  after: JSON # State after change
  createdAt: Timestamp!
}

# Articles for internal knowledge and future AI training
type KnowledgeBaseArticles @table(name: "knowledge_base_articles") @auth(ops: []) {
  id: ID! @column(name: "article_id", primaryKey: true)
  title: String!
  category: String!
  summary: String
  content: String! @column(type: "TEXT")
  status: ArticleStatus!
  isEligibleForAI: Boolean! @column(default: false)
  authorId: ID! @column(name: "author_id")
  createdAt: Timestamp!
  updatedAt: Timestamp!
  author: Users! @relation(field: "authorId", references: "id")
}

# Singleton table for global AI settings
type AISettings @table(name: "ai_settings") @auth(ops: []) {
  id: ID! @column(primaryKey: true, default: "1")
  mode: AIMode! @column(default: "ASSISTED")
  manualFinalizationRequired: Boolean! @column(default: true)
  # Other provider settings, etc.
}

# Keys to unlock specific features, like commercial automation
type ActivationKeys @table(name: "activation_keys") @auth(ops: []) {
  id: ID! @column(name: "key_id", primaryKey: true)
  key: String! @column(unique: true)
  status: ActivationKeyStatus!
  type: ActivationKeyType!
  createdAt: Timestamp!
  expiresAt: Timestamp
}

# Represents a specific account on a channel (e.g., a specific WhatsApp number)
type ChannelAccounts @table(name: "channel_accounts") @auth(ops: []) {
  id: ID! @column(name: "account_id", primaryKey: true)
  type: ChannelType!
  accountIdentifier: String! # e.g., phone number, page ID
  displayName: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  connections: [ChannelConnections!]! @relation(field: "id", references: "channelAccountId")
}

# Represents the connection status and configuration for a ChannelAccount
type ChannelConnections @table(name: "channel_connections") @auth(ops: []) {
  id: ID! @column(name: "connection_id", primaryKey: true)
  channelAccountId: ID! @column(name: "channel_account_id")
  status: ChannelStatus!
  aiEnabled: Boolean! @column(default: true)
  notes: String
  lastChecked: Timestamp
  lastError: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
  account: ChannelAccounts! @relation(field: "channelAccountId", references: "id")
}
