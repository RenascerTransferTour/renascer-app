"""
Data Connect schema for Renascer Transfer Tour backend.
Version: 1.0.0
Phase: 2 - Relational Model Foundation
"""

# ---------------------------------
# Enums for Status and Types
# ---------------------------------

enum UserRole {
  ADMIN
  AGENT
  VIEWER
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  UNCONFIRMED
  CLOSED_WON
  CLOSED_LOST
  CANCELED
  AGUARDANDO_FECHAMENTO
}

enum QuoteStatus {
  DRAFT
  REVIEW
  SENT
  UNCONFIRMED
  APPROVED
  LOST
  CANCELED
  AWAITING_APPROVAL
}

enum ReservationStatus {
  PENDING
  UNCONFIRMED
  CONFIRMED
  RESCHEDULED
  COMPLETED
  CANCELED
  AWAITING_APPROVAL
}

enum ActorType {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

# ---------------------------------
# Core Entities
# ---------------------------------

"""
Represents system operators. Linked to Firebase Auth via UID.
"""
type Users @table(name: "users") {
  id: Int! @primaryKey
  uid: String! @unique
  email: String! @unique
  displayName: String
  photoURL: String
  createdAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  updatedAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  roles: [UserRoles] @relation(on: "userId")
}

type Roles @table(name: "roles") {
  id: Int! @primaryKey
  name: UserRole! @unique
  users: [UserRoles] @relation(on: "roleId")
}

"""
Join table for many-to-many relationship between Users and Roles.
"""
type UserRoles @table(name: "user_roles") {
  userId: Int!
  roleId: Int!
  user: Users! @foreignKey(on: "userId")
  role: Roles! @foreignKey(on: "roleId")
  @@primaryKey(fields: ["userId", "roleId"])
}

"""
Represents customers or leads.
"""
type Contacts @table(name: "contacts") {
  id: Int! @primaryKey
  fullName: String!
  phone: String
  email: String @unique
  originChannel: String
  notes: String
  createdAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  updatedAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  deals: [Deals] @relation(on: "contactId")
}

"""
Represents a deal or opportunity in the sales pipeline.
"""
type Deals @table(name: "deals") {
  id: Int! @primaryKey
  title: String!
  stage: DealStage! @default(value: "NEW_LEAD")
  estimatedValue: Float
  contactId: Int!
  contact: Contacts @foreignKey(on: "contactId")
  assignedToId: Int
  assignedTo: Users @foreignKey(on: "assignedToId")
  createdAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  updatedAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  quote: Quotes @relation(on: "dealId")
}

"""
Represents a price quotation for a service.
"""
type Quotes @table(name: "quotes") {
  id: Int! @primaryKey
  dealId: Int! @unique
  deal: Deals @foreignKey(on: "dealId")
  status: QuoteStatus! @default(value: "DRAFT")
  summary: String!
  finalApprovedValue: Float
  approvedById: Int
  approvedBy: Users @foreignKey(on: "approvedById")
  createdAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  updatedAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  reservation: Reservations @relation(on: "quoteId")
}

"""
Represents a confirmed service booking.
"""
type Reservations @table(name: "reservations") {
  id: Int! @primaryKey
  quoteId: Int! @unique
  quote: Quotes @foreignKey(on: "quoteId")
  status: ReservationStatus! @default(value: "PENDING")
  serviceDate: Timestamp!
  details: String
  confirmedById: Int
  confirmedBy: Users @foreignKey(on: "confirmedById")
  createdAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
  updatedAt: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
}

"""
Logs important actions within the system for auditing purposes.
"""
type AuditLogs @table(name: "audit_logs") {
  id: Int! @primaryKey
  actor: String!
  actorType: ActorType!
  eventType: String!
  entityType: String!
  entityId: String!
  notes: String
  source: String
  timestamp: Timestamp! @default(expression: "CURRENT_TIMESTAMP")
}


# The @auth directive secures the entire API.
# Initially, allow any authenticated user. Granular rules will be added later.
query: Query @auth(
  rules: [
    {allow: "private"}
  ]
)

mutation: Mutation @auth(
  rules: [
    {allow: "private"}
  ]
)
