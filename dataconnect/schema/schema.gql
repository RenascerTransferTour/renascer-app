# Defines standard CRUD mutations for a given type.
# The 'input' argument for create and update will be a generated type.
# It is not necessary to define it in the schema.
directive @generate(
  # The name of the type to generate mutations for.
  type: String!
  # A list of mutations to generate.
  # Options: "create", "update", "delete".
  # Default: ["create", "update", "delete"]
  mutations: [String!]
) on OBJECT

# Maps a GraphQL type to a database table.
directive @table(
  # The name of the table in the database.
  name: String!
) on OBJECT

# Maps a GraphQL field to a database column.
directive @column(
  # The name of the column in the database.
  name: String!
  # The database-specific type of the column.
  type: String
) on FIELD_DEFINITION

# Enums for status fields
enum UserRoleType {
  ADMIN
  AGENT
  VIEWER
}

enum ChannelType {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
}

enum ConnectionStatus {
  CONNECTED
  DISCONNECTED
  PENDING
  EXPIRED
  AWAITING_QR
  FAILING
}

enum LeadStatus {
  NEW
  QUALIFIED
  CONTACTED
  UNQUALIFIED
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  UNCONFIRMED
  CLOSED_WON
  CLOSED_LOST
  CANCELED
  AGUARDANDO_FECHAMENTO
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  UNCONFIRMED
  CANCELED
  AGUARDANDO_HUMANO
  IA_BLOQUEADA
  IA_ASSISTIDA
  IA_AUTORIZADA
  CONCLUIDO_PELA_IA
  CONCLUIDO_POR_HUMANO
}

enum QuoteStatus {
  DRAFT
  REVIEW
  SENT
  UNCONFIRMED
  APPROVED
  LOST
  CANCELED
  AWAITING_APPROVAL
}

enum ReservationStatus {
  PENDING
  UNCONFIRMED
  CONFIRMED
  RESCHEDULED
  COMPLETED
  CANCELED
  AWAITING_APPROVAL
}

enum ActorType {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

enum EventSource {
  APP
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
  AI_FLOW
  MANUAL
}

type Users @table(name: "users") {
  id: ID! @column(name: "user_id")
  fullName: String! @column(name: "full_name")
  email: String! @column(name: "email")
  avatarUrl: String @column(name: "avatar_url")
  isActive: Boolean! @column(name: "is_active")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
  # Relationship
  roles: [Roles] @column(name: "user_roles")
}

type Roles @table(name: "roles") {
  id: ID! @column(name: "role_id")
  roleName: UserRoleType! @column(name: "role_name")
  description: String
}

type UserRoles @table(name: "user_roles") {
  user: Users! @column(name: "user_id")
  role: Roles! @column(name: "role_id")
}

type Contacts @table(name: "contacts") {
  id: ID! @column(name: "contact_id")
  fullName: String! @column(name: "full_name")
  phone: String
  email: String
  avatarUrl: String @column(name: "avatar_url")
  originChannel: String @column(name: "origin_channel")
  notes: String
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type Deals @table(name: "deals") {
  id: ID! @column(name: "deal_id")
  contact: Contacts! @column(name: "contact_id")
  title: String!
  stage: DealStage!
  estimatedValue: Float @column(name: "estimated_value")
  assignedTo: Users @column(name: "assigned_to_user_id")
  approvedBy: Users @column(name: "approved_by_user_id")
  nextAction: String @column(name: "next_action")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type Conversations @table(name: "conversations") {
  id: ID! @column(name: "conversation_id")
  contact: Contacts! @column(name: "contact_id")
  channel: ChannelConnections! @column(name: "channel_connection_id")
  deal: Deals @column(name: "deal_id")
  status: ConversationStatus!
  assignedTo: Users @column(name: "assigned_to_user_id")
  isAiActive: Boolean! @column(name: "is_ai_active")
  lastMessage: String @column(name: "last_message")
  lastMessageAt: Timestamp! @column(name: "last_message_at")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type Messages @table(name: "messages") {
  id: ID! @column(name: "message_id")
  conversation: Conversations! @column(name: "conversation_id")
  senderType: ActorType! @column(name: "sender_type")
  authorName: String @column(name: "author_name")
  content: String!
  createdAt: Timestamp! @column(name: "created_at")
}

type Quotes @table(name: "quotes") {
  id: ID! @column(name: "quote_id")
  deal: Deals! @column(name: "deal_id")
  status: QuoteStatus!
  origin: String
  destination: String
  serviceDate: Timestamp @column(name: "service_date")
  serviceTime: String @column(name: "service_time")
  passengers: Int
  bags: Int
  aiSuggestedValue: Float @column(name: "ai_suggested_value")
  finalApprovedValue: Float @column(name: "final_approved_value")
  approvedBy: Users @column(name: "approved_by_user_id")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type Reservations @table(name: "reservations") {
  id: ID! @column(name: "reservation_id")
  quote: Quotes! @column(name: "quote_id")
  status: ReservationStatus!
  serviceDate: Timestamp! @column(name: "service_date")
  serviceTime: String! @column(name: "service_time")
  confirmedBy: Users @column(name: "confirmed_by_user_id")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type CalendarEvents @table(name: "calendar_events") {
  id: ID! @column(name: "event_id")
  reservation: Reservations @column(name: "reservation_id")
  title: String!
  startTime: Timestamp! @column(name: "start_time")
  endTime: Timestamp! @column(name: "end_time")
  assignedTo: Users @column(name: "assigned_to_user_id")
  status: String!
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type AuditLogs @table(name: "audit_logs") {
  id: ID! @column(name: "log_id")
  timestamp: Timestamp!
  actor: String!
  actorType: ActorType! @column(name: "actor_type")
  eventType: String! @column(name: "event_type")
  entityType: String! @column(name: "entity_type")
  entityId: String! @column(name: "entity_id")
  before: JSON
  after: JSON
  notes: String
  source: EventSource!
}

type KnowledgeBaseArticles @table(name: "knowledge_base_articles") {
  id: ID! @column(name: "article_id")
  title: String!
  category: String!
  summary: String
  content: String!
  status: String!
  isEligibleForAI: Boolean! @column(name: "is_eligible_for_ai")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type AISettings @table(name: "ai_settings") {
  id: ID! @column(name: "setting_id")
  mode: String!
  providerStatus: String! @column(name: "provider_status")
  manualFinalizationRequired: Boolean! @column(name: "manual_finalization_required")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type ActivationKeys @table(name: "activation_keys") {
  id: ID! @column(name: "key_id")
  keyName: String! @column(name: "key_name")
  keyValue: String! @column(name: "key_value")
  status: String!
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type ChannelAccounts @table(name: "channel_accounts") {
  id: ID! @column(name: "account_id")
  channelType: ChannelType! @column(name: "channel_type")
  accountIdentifier: String! @column(name: "account_identifier")
  displayName: String @column(name: "display_name")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

type ChannelConnections @table(name: "channel_connections") {
  id: ID! @column(name: "connection_id")
  channelAccount: ChannelAccounts! @column(name: "account_id")
  status: ConnectionStatus!
  lastChecked: Timestamp @column(name: "last_checked")
  lastError: String @column(name: "last_error")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

# The Query type defines the available queries for the GraphQL API.
# Data Connect will generate queries for each type.
# Example: users(id: "1") { id fullName }
type Query {}
