# Defines the user authentication and authorization model.
type Users @table {
  id: String! @primaryKey
  email: String @unique
  fullName: String
  avatarUrl: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Roles @table {
  id: String! @primaryKey
  name: String! @unique # e.g., 'admin', 'agent'
  description: String
}

type UserRoles @table {
  userId: String!
  roleId: String!
  user: Users! @foreignKey(references: "id")
  role: Roles! @foreignKey(references: "id")
}

# Core business entities
type Contacts @table {
  id: String! @primaryKey
  fullName: String!
  email: String @unique
  phone: String
  avatarUrl: String
  originChannel: String
  notes: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Deals @table {
  id: String! @primaryKey
  title: String!
  contactId: String!
  contact: Contacts! @foreignKey(references: "id")
  pipelineStage: DealStage!
  estimatedValue: Float
  ownerId: String # Can be a User ID or 'IA'
  status: DealStatus!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Conversations @table {
  id: String! @primaryKey
  contactId: String!
  contact: Contacts! @foreignKey(references: "id")
  channelId: String!
  channel: ChannelConnections! @foreignKey(references: "id")
  status: ConversationStatus!
  priority: PriorityLevel
  isAiActive: Boolean!
  humanOwnerId: String # User ID
  lastMessageSnippet: String
  lastMessageAt: Timestamp
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Messages @table {
  id: String! @primaryKey
  conversationId: String!
  conversation: Conversations! @foreignKey(references: "id")
  senderType: SenderType!
  authorName: String
  content: String!
  contentType: ContentType!
  createdAt: Timestamp!
}

type Quotes @table {
  id: String! @primaryKey
  dealId: String!
  deal: Deals! @foreignKey(references: "id")
  status: QuoteStatus!
  summary: String!
  priceRangeMin: Float
  priceRangeMax: Float
  finalValue: Float
  approvedByHumanId: String # User ID
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type Reservations @table {
  id: String! @primaryKey
  quoteId: String!
  quote: Quotes! @foreignKey(references: "id")
  status: ReservationStatus!
  serviceDetails: String
  serviceDate: Timestamp
  confirmedBy: String # User ID or 'IA'
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type CalendarEvents @table {
  id: String! @primaryKey
  reservationId: String
  reservation: Reservations @foreignKey(references: "id")
  title: String!
  eventType: CalendarEventType!
  start: Timestamp!
  "end": Timestamp! # Using quotes for reserved keyword
  assignedToId: String # User ID
  status: EventStatus!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type AuditLogs @table {
  id: String! @primaryKey
  timestamp: Timestamp!
  actor: String!
  actorType: ActorType!
  eventType: String!
  entityType: String!
  entityId: String!
  notes: String
  source: String
}

type KnowledgeBaseArticles @table {
  id: String! @primaryKey
  title: String!
  category: String!
  summary: String
  content: String!
  status: ArticleStatus!
  isEligibleForAI: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

# Settings and configuration entities
type AISettings @table {
  id: String! @primaryKey
  globalAiEnabled: Boolean!
  aiMode: AIMode!
  requireHumanApproval: Boolean!
  activeProvider: String!
  isFallbackEnabled: Boolean!
}

type ActivationKeys @table {
  id: String! @primaryKey
  keyName: String! @unique # e.g., 'commercial_activation'
  status: KeyStatus!
  description: String
  expiresAt: Timestamp
}

type ChannelAccounts @table {
  id: String! @primaryKey
  type: ChannelType! # e.g., 'whatsapp', 'instagram'
  accountName: String!
  accountId: String @unique
}

type ChannelConnections @table {
  id: String! @primaryKey
  channelAccountId: String!
  channelAccount: ChannelAccounts! @foreignKey(references: "id")
  status: ConnectionStatus!
  aiEnabled: Boolean!
  lastChecked: Timestamp
  lastError: String
}

# Enums for status fields
enum DealStage { NEW_LEAD, QUALIFIED, QUOTE_SENT, NEGOTIATION, CLOSED_WON, CLOSED_LOST }
enum DealStatus { OPEN, WON, LOST, CANCELED }
enum ConversationStatus { OPEN, CLOSED, PENDING, AGUARDANDO_HUMANO }
enum PriorityLevel { LOW, MEDIUM, HIGH }
enum SenderType { USER, AGENT, AI, SYSTEM }
enum ContentType { TEXT, IMAGE, FILE }
enum QuoteStatus { DRAFT, SENT, APPROVED, REJECTED, CANCELED }
enum ReservationStatus { PENDING, CONFIRMED, CANCELED, COMPLETED }
enum CalendarEventType { PICKUP, TRANSFER, TOUR, MAINTENANCE }
enum EventStatus { CONFIRMED, PENDING, CANCELED }
enum ActorType { HUMAN, AI, SYSTEM, CUSTOMER }
enum ArticleStatus { DRAFT, PUBLISHED, ARCHIVED }
enum AIMode { OFF, ASSISTED, AUTONOMOUS }
enum KeyStatus { ACTIVE, INACTIVE, EXPIRED }
enum ChannelType { WHATSAPP, INSTAGRAM, FACEBOOK, WEBSITE }
enum ConnectionStatus { CONNECTED, DISCONNECTED, PENDING, FAILING }
