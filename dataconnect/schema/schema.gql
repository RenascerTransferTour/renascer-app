# Base de autenticação e permissões
type Users @table(key: "userId") {
  userId: String! @db(default: "gen_random_uuid()")
  email: String! @unique
  fullName: String
  avatarUrl: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  roles: [UserRoles]
}

type Roles @table(key: "roleId") {
  roleId: String! @db(default: "gen_random_uuid()")
  name: String! @unique # e.g., 'admin', 'agent'
  permissions: JSON
  users: [UserRoles]
}

type UserRoles @table(key: ["userId", "roleId"]) {
  userId: String!
  roleId: String!
  user: Users! @reference(to: "userId")
  role: Roles! @reference(to: "roleId")
}

# Entidades de negócio
type Contacts @table(key: "contactId") {
  contactId: String! @db(default: "gen_random_uuid()")
  fullName: String!
  phone: String @unique
  email: String @unique
  avatarUrl: String
  originChannel: String
  notes: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  conversations: [Conversations]
  deals: [Deals]
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  AWAITING_ACTION
  CLOSED_WON
  CLOSED_LOST
}

type Deals @table(key: "dealId") {
  dealId: String! @db(default: "gen_random_uuid()")
  contactId: String!
  contact: Contacts! @reference(to: "contactId")
  title: String!
  stage: DealStage! @db(default: "NEW_LEAD")
  estimatedValue: Float
  assignedTo: String # FK to Users
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  quote: Quotes
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  AWAITING_HUMAN
}

type Conversations @table(key: "conversationId") {
  conversationId: String! @db(default: "gen_random_uuid()")
  contactId: String!
  contact: Contacts! @reference(to: "contactId")
  channelConnectionId: String!
  channelConnection: ChannelConnections! @reference(to: "channelConnectionId")
  status: ConversationStatus! @db(default: "OPEN")
  assignedTo: String # FK to Users
  lastMessageSnippet: String
  lastMessageAt: Timestamp
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  messages: [Messages]
}

enum MessageSenderType {
  USER
  AGENT
  AI
  SYSTEM
}

type Messages @table(key: "messageId") {
  messageId: String! @db(default: "gen_random_uuid()")
  conversationId: String!
  conversation: Conversations! @reference(to: "conversationId")
  senderType: MessageSenderType!
  senderId: String # Can be contactId or userId
  content: String!
  contentType: String! @db(default: "'text'")
  createdAt: Timestamp! @db(default: "now()")
}

enum QuoteStatus {
  DRAFT
  SENT
  APPROVED
  REJECTED
  EXPIRED
}

type Quotes @table(key: "quoteId") {
  quoteId: String! @db(default: "gen_random_uuid()")
  dealId: String!
  deal: Deals! @reference(to: "dealId")
  status: QuoteStatus! @db(default: "DRAFT")
  summary: String
  aiSuggestedValue: Float
  finalValue: Float
  approvedBy: String # FK to Users
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  reservation: Reservations
}

enum ReservationStatus {
  PENDING
  CONFIRMED
  CANCELED
  COMPLETED
}

type Reservations @table(key: "reservationId") {
  reservationId: String! @db(default: "gen_random_uuid()")
  quoteId: String!
  quote: Quotes! @reference(to: "quoteId")
  status: ReservationStatus! @db(default: "PENDING")
  serviceDate: Timestamp
  notes: String
  confirmedBy: String # FK to Users
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type CalendarEvents @table(key: "eventId") {
  eventId: String! @db(default: "gen_random_uuid()")
  reservationId: String
  reservation: Reservations @reference(to: "reservationId")
  title: String!
  start: Timestamp!
  end: Timestamp!
  assignedTo: String # FK to Users
  createdAt: Timestamp! @db(default: "now()")
}

# Configuração e Logging
type AuditLogs @table(key: "logId") {
  logId: String! @db(default: "gen_random_uuid()")
  actorId: String
  actorType: String!
  eventType: String!
  entityType: String
  entityId: String
  beforeState: JSON
  afterState: JSON
  notes: String
  source: String
  createdAt: Timestamp! @db(default: "now()")
}

type KnowledgeBaseArticles @table(key: "articleId") {
  articleId: String! @db(default: "gen_random_uuid()")
  title: String!
  category: String
  summary: String
  content: String!
  status: String! @db(default: "'draft'")
  isEligibleForAI: Boolean! @db(default: "false")
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type AISettings @table(key: "settingsId") {
  settingsId: Int! @db(default: "1")
  mode: String! @db(default: "'assisted'")
  manualFinalizationRequired: Boolean! @db(default: "true")
  updatedAt: Timestamp! @db(default: "now()")
}

type ActivationKeys @table(key: "keyId") {
  keyId: String! @db(default: "gen_random_uuid()")
  serviceName: String! @unique # e.g., 'COMMERCIAL_AUTONOMY'
  keyHash: String
  status: String! @db(default: "'inactive'")
  expiresAt: Timestamp
  createdAt: Timestamp! @db(default: "now()")
}

# Configuração de Canais
type ChannelAccounts @table(key: "accountId") {
  accountId: String! @db(default: "gen_random_uuid()")
  accountName: String! # e.g., 'WhatsApp Principal', 'Instagram Comercial'
  channelType: String! # 'WHATSAPP', 'INSTAGRAM', etc.
  createdAt: Timestamp! @db(default: "now()")
  connections: [ChannelConnections]
}

enum ChannelStatus {
  DISCONNECTED
  CONNECTED
  AWAITING_QR
  FAILING
}

type ChannelConnections @table(key: "channelConnectionId") {
  channelConnectionId: String! @db(default: "gen_random_uuid()")
  accountId: String!
  account: ChannelAccounts! @reference(to: "accountId")
  status: ChannelStatus! @db(default: "DISCONNECTED")
  lastStatusUpdate: Timestamp
  aiEnabled: Boolean! @db(default: "true")
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}
