"""
The `Timestamp` scalar type represents a point in time, represented as an RFC3339 UTC "Zulu" formatted string.
"""
scalar Timestamp

# --- User and Access Control ---

type Users @table(name: "users") {
  userId: String! @column(name: "user_id", primaryKey: true)
  fullName: String @column(name: "full_name")
  email: String @column(name: "email", unique: true)
  role: String @column(name: "role")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
  userRoles: [UserRoles] @relation(table: "UserRoles", key: "userId", references: "userId")
}

type Roles @table(name: "roles") {
  roleId: String! @column(name: "role_id", primaryKey: true)
  roleName: String @column(name: "role_name", unique: true)
  permissions: String # Simple string for now, could be JSON
  userRoles: [UserRoles] @relation(table: "UserRoles", key: "roleId", references: "roleId")
}

type UserRoles @table(name: "user_roles") {
  userId: String! @column(name: "user_id")
  roleId: String! @column(name: "role_id")
  user: Users @relation(key: "userId", references: "userId")
  role: Roles @relation(key: "roleId", references: "roleId")
}

# --- Core Business Entities ---

type Contacts @table(name: "contacts") {
  contactId: String! @column(name: "contact_id", primaryKey: true)
  fullName: String @column(name: "full_name")
  phone: String
  email: String
  avatar: String
  language: String
  notes: String
  originChannel: String @column(name: "origin_channel")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
}

enum DealPipelineStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  UNCONFIRMED
  CLOSED_WON
  CLOSED_LOST
  CANCELED
  AGUARDANDO_FECHAMENTO
}

type Deals @table(name: "deals") {
  dealId: String! @column(name: "deal_id", primaryKey: true)
  contactId: String! @column(name: "contact_id")
  title: String
  pipelineStage: DealPipelineStage @column(name: "pipeline_stage")
  estimatedValue: Float @column(name: "estimated_value")
  ownerId: String @column(name: "owner_id")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
  contact: Contacts @relation(key: "contactId", references: "contactId")
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  UNCONFIRMED
  CANCELED
  AGUARDANDO_HUMANO
  IA_BLOQUEADA
  IA_ASSISTIDA
  IA_AUTORIZADA
  CONCLUIDO_PELA_IA
  CONCLUIDO_POR_HUMANO
}

type Conversations @table(name: "conversations") {
  conversationId: String! @column(name: "conversation_id", primaryKey: true)
  contactId: String! @column(name: "contact_id")
  channelId: String! @column(name: "channel_id")
  status: ConversationStatus
  humanOwnerId: String @column(name: "human_owner_id")
  isAiActive: Boolean @column(name: "is_ai_active")
  lastMessage: String @column(name: "last_message")
  lastMessageAt: Timestamp @column(name: "last_message_at")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
  contact: Contacts @relation(key: "contactId", references: "contactId")
  messages: [Messages] @relation(table: "Messages", key: "conversationId", references: "conversationId")
}

enum SenderType {
  USER
  AGENT
  AI
  SYSTEM
}

type Messages @table(name: "messages") {
  messageId: String! @column(name: "message_id", primaryKey: true)
  conversationId: String! @column(name: "conversation_id")
  senderType: SenderType @column(name: "sender_type")
  content: String
  createdAt: Timestamp @column(name: "created_at")
  conversation: Conversations @relation(key: "conversationId", references: "conversationId")
}

enum QuoteStatus {
  RASCUNHO
  EM_REVISAO
  ENVIADO
  NAO_CONFIRMADO
  APROVADO
  PERDIDO
  CANCELADO
  AGUARDANDO_APROVACAO
}

type Quotes @table(name: "quotes") {
  quoteId: String! @column(name: "quote_id", primaryKey: true)
  contactId: String! @column(name: "contact_id")
  conversationId: String! @column(name: "conversation_id")
  status: QuoteStatus
  summary: String
  priceRangeMin: Float @column(name: "price_range_min")
  priceRangeMax: Float @column(name: "price_range_max")
  finalValue: Float @column(name: "final_value")
  ownerId: String @column(name: "owner_id")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
  contact: Contacts @relation(key: "contactId", references: "contactId")
}

enum ReservationStatus {
  PENDENTE
  NAO_CONFIRMADO
  CONFIRMADA
  REAGENDADA
  CONCLUIDA
  CANCELADA
  AGUARDANDO_APROVACAO
}

type Reservations @table(name: "reservations") {
  reservationId: String! @column(name: "reservation_id", primaryKey: true)
  quoteId: String! @column(name: "quote_id")
  contactId: String! @column(name: "contact_id")
  status: ReservationStatus
  scheduledDate: Timestamp @column(name: "scheduled_date")
  service: String
  details: String
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
  contact: Contacts @relation(key: "contactId", references: "contactId")
}

enum EventType {
  PICKUP
  TRANSFER
  TOUR
  BOOKING
  MAINTENANCE
}

enum EventStatus {
  CONFIRMADA
  PENDENTE
  CANCELADA
  CONCLUIDA
  AGUARDANDO_APROVACAO
}

type CalendarEvents @table(name: "calendar_events") {
  eventId: String! @column(name: "event_id", primaryKey: true)
  reservationId: String @column(name: "reservation_id")
  title: String
  eventType: EventType @column(name: "event_type")
  start: Timestamp
  end: Timestamp
  status: EventStatus
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
}

enum ActorType {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

type AuditLogs @table(name: "audit_logs") {
  logId: String! @column(name: "log_id", primaryKey: true)
  timestamp: Timestamp
  actor: String
  actorType: ActorType @column(name: "actor_type")
  entityType: String @column(name: "entity_type")
  entityId: String @column(name: "entity_id")
  eventType: String @column(name: "event_type")
  notes: String
  contactId: String @column(name: "contact_id")
}

type KnowledgeBaseArticles @table(name: "kb_articles") {
  articleId: String! @column(name: "article_id", primaryKey: true)
  category: String
  title: String
  summary: String
  content: String
  author: String
  status: String
  isEligibleForAI: Boolean @column(name: "is_eligible_for_ai")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
}

# --- Settings ---

enum AIMode {
  OFF
  ASSISTED
  PARTIAL_AUTONOMOUS
  FULL_AUTONOMOUS
}

type AISettings @table(name: "ai_settings") {
  settingsId: String! @column(name: "settings_id", primaryKey: true)
  globalAiEnabled: Boolean @column(name: "global_ai_enabled")
  aiMode: AIMode @column(name: "ai_mode")
  activeProvider: String @column(name: "active_provider")
  isFallbackEnabled: Boolean @column(name: "is_fallback_enabled")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
}

type ActivationKeys @table(name: "activation_keys") {
  keyId: String! @column(name: "key_id", primaryKey: true)
  keyName: String @column(name: "key_name")
  keyValue: String @column(name: "key_value")
  status: String
  expiresAt: Timestamp @column(name: "expires_at")
  createdAt: Timestamp @column(name: "created_at")
}

enum ChannelType {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
}

enum ChannelStatus {
  CONNECTED
  DISCONNECTED
  PENDING
  EXPIRED
  AWAITING_QR
  FAILING
}

type ChannelAccounts @table(name: "channel_accounts") {
  accountId: String! @column(name: "account_id", primaryKey: true)
  channelType: ChannelType @column(name: "channel_type")
  accountName: String @column(name: "account_name")
  credentials: String # JSON string
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
}

type ChannelConnections @table(name: "channel_connections") {
  connectionId: String! @column(name: "connection_id", primaryKey: true)
  accountId: String! @column(name: "account_id")
  status: ChannelStatus
  aiEnabled: Boolean @column(name: "ai_enabled")
  lastChecked: Timestamp @column(name: "last_checked")
  createdAt: Timestamp @column(name: "created_at")
  updatedAt: Timestamp @column(name: "updated_at")
  account: ChannelAccounts @relation(key: "accountId", references: "accountId")
}
