# ------------------------------------------------------------------
# ENUMS
# Reusable enumerations for status fields across different types.
# ------------------------------------------------------------------

enum UserRole {
  ADMIN
  AGENT
  VIEWER
}

enum LeadStatus {
  NEW
  QUALIFIED
  CONTACTED
  UNQUALIFIED
}

enum UrgencyLevel {
  LOW
  MEDIUM
  HIGH
}

enum InterestLevel {
  LOW
  MEDIUM
  HIGH
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  AWAITING_HUMAN
  IA_ASSISTIDA
}

enum ChannelType {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
}

enum ChannelStatus {
  CONNECTED
  DISCONNECTED
  PENDING
  AWAITING_QR
  FAILING
}

enum QuoteStatus {
  DRAFT
  REVIEW
  SENT
  UNCONFIRMED
  APPROVED
  LOST
  CANCELED
}

enum ReservationStatus {
  PENDING
  UNCONFIRMED
  CONFIRMED
  RESCHEDULED
  COMPLETED
  CANCELED
}

enum DealPipelineStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  UNCONFIRMED
  CLOSED_WON
  CLOSED_LOST
  CANCELED
}

enum AIMode {
  OFF
  ASSISTED
  PARTIAL_AUTONOMOUS
  FULL_AUTONOMOUS
}

# ------------------------------------------------------------------
# CORE TABLES
# These tables represent the foundational data of the application.
# ------------------------------------------------------------------

"""
Represents system operators and their permissions.
"""
type Users @table(key: "id") {
  id: String!
  fullName: String!
  email: String! @unique
  role: UserRole!
  active: Boolean!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
Defines the roles available in the system.
"""
type Roles @table(key: "id") {
  id: String!
  name: String! @unique
  description: String
}

"""
Junction table to link users with their roles (many-to-many).
"""
type UserRoles @table(key: ["userId", "roleId"]) {
  userId: String!
  roleId: String!
  user: Users @reference(key: "userId")
  role: Roles @reference(key: "roleId")
}

"""
Stores information about customers and leads.
"""
type Contacts @table(key: "id") {
  id: String!
  fullName: String!
  phone: String
  email: String
  originChannel: String
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
Tracks sales opportunities through the pipeline.
"""
type Deals @table(key: "id") {
  id: String!
  contactId: String!
  contact: Contacts @reference(key: "contactId")
  title: String!
  pipelineStage: DealPipelineStage!
  estimatedValue: Float!
  ownerId: String!
  owner: Users @reference(key: "ownerId")
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
Represents a single conversation with a contact across any channel.
"""
type Conversations @table(key: "id") {
  id: String!
  contactId: String!
  contact: Contacts @reference(key: "contactId")
  channelId: String!
  channel: ChannelConnections @reference(key: "channelId")
  status: ConversationStatus!
  priority: UrgencyLevel!
  isAiActive: Boolean!
  humanOwnerId: String
  humanOwner: Users @reference(key: "humanOwnerId")
  lastMessageSummary: String
  lastMessageAt: Timestamp!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
A single message within a conversation.
"""
type Messages @table(key: "id") {
  id: String!
  conversationId: String!
  conversation: Conversations @reference(key: "conversationId")
  senderType: String! # user, agent, ai, system
  content: String!
  createdAt: Timestamp!
}

"""
Stores quotes or price estimates sent to clients.
"""
type Quotes @table(key: "id") {
  id: String!
  dealId: String!
  deal: Deals @reference(key: "dealId")
  status: QuoteStatus!
  summary: String!
  priceRangeStart: Float!
  priceRangeEnd: Float!
  finalValue: Float
  ownerId: String!
  owner: Users @reference(key: "ownerId")
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
Confirmed service bookings.
"""
type Reservations @table(key: "id") {
  id: String!
  quoteId: String!
  quote: Quotes @reference(key: "quoteId")
  status: ReservationStatus!
  serviceDetails: String!
  scheduledDate: Timestamp!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
Events to be displayed on the operational calendar.
"""
type CalendarEvents @table(key: "id") {
  id: String!
  reservationId: String
  reservation: Reservations @reference(key: "reservationId")
  title: String!
  start: Timestamp!
  end: Timestamp!
  status: ReservationStatus!
  assignedTeamMemberId: String
  assignedTeamMember: Users @reference(key: "assignedTeamMemberId")
  createdAt: Timestamp!
}

"""
Logs important actions taken by users or the system for auditing purposes.
"""
type AuditLogs @table(key: "id") {
  id: String!
  timestamp: Timestamp!
  actor: String!
  actorType: String! # human, ai, system, customer
  entityType: String!
  entityId: String!
  eventType: String!
  notes: String
}

# ------------------------------------------------------------------
# SETTINGS & KNOWLEDGE BASE TABLES
# Configuration tables for AI behavior and internal knowledge.
# ------------------------------------------------------------------

"""
Internal documentation for company policies, services, etc.
"""
type KnowledgeBaseArticles @table(key: "id") {
  id: String!
  category: String!
  title: String!
  content: String!
  status: String! # draft, published, archived
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

"""
Global settings for the AI assistant.
"""
type AISettings @table(key: "id") {
  id: Int!
  globalAiEnabled: Boolean!
  aiMode: AIMode!
  activeProvider: String! # openai, gemini, automatic
  isFallbackEnabled: Boolean!
}

"""
Stores API keys or connection details for external services (e.g., AI providers).
"""
type ActivationKeys @table(key: "id") {
  id: String!
  serviceName: String! @unique
  keyType: String! # API_KEY, OAUTH_TOKEN
  value: String! # This should be a reference to a secret manager
  createdAt: Timestamp!
}

"""
Represents a specific account on a channel (e.g., a WhatsApp number, an Instagram handle).
"""
type ChannelAccounts @table(key: "id") {
  id: String!
  channelType: ChannelType!
  accountIdentifier: String! # e.g., phone number, page ID
  displayName: String
}

"""
Manages the connection status and configuration for each channel account.
"""
type ChannelConnections @table(key: "id") {
  id: String!
  accountId: String!
  account: ChannelAccounts @reference(key: "accountId")
  status: ChannelStatus!
  aiEnabled: Boolean!
  lastChecked: Timestamp
  lastError: String
}
