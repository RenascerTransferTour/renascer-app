
"""
This is the initial Data Connect schema for the Renascer Transfer Tour system.
It defines the core relational data model that will be provisioned on PostgreSQL.
"""

# -------------------------------------
# ENUMS - For consistent status fields
# -------------------------------------

enum UserRoleEnum {
  ADMIN
  AGENT
  VIEWER
}

enum ContactStatusEnum {
  NEW
  CONTACTED
  QUALIFIED
  UNQUALIFIED
  ARCHIVED
}

enum DealStageEnum {
  NEW_LEAD
  QUALIFIED
  PROPOSAL_SENT
  NEGOTIATION
  VERBAL_AGREEMENT
  CLOSED_WON
  CLOSED_LOST
  STALLED
}

enum ConversationStatusEnum {
  OPEN
  PENDING_HUMAN
  PENDING_AI
  CLOSED
  ARCHIVED
}

enum MessageSenderTypeEnum {
  CUSTOMER
  AGENT
  AI
  SYSTEM
}

enum QuoteStatusEnum {
  DRAFT
  SENT
  APPROVED
  REJECTED
  CANCELED
}

enum ReservationStatusEnum {
  PENDING_CONFIRMATION
  CONFIRMED
  COMPLETED
  CANCELED
  RESCHEDULED
}

enum CalendarEventTypeEnum {
  PICKUP
  TRANSFER
  TOUR
  TASK
  MAINTENANCE
}

enum AuditActorTypeEnum {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

enum KnowledgeBaseStatusEnum {
  DRAFT
  REVIEW
  PUBLISHED
  ARCHIVED
}

enum AIModeEnum {
  OFF
  ASSISTED
  SEMI_AUTONOMOUS
}

enum ActivationKeyStatusEnum {
  ACTIVE
  INACTIVE
  EXPIRED
}

enum ChannelTypeEnum {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
  MANUAL
}

enum ChannelConnectionStatusEnum {
  NOT_CONFIGURED
  PENDING_AUTH
  CONNECTED
  FAILING
  DISCONNECTED
  MOCK
}

# -------------------------------------
# CORE TABLES
# -------------------------------------

type Users @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  fullName: String!
  email: String! @column(unique: true)
  avatarUrl: String
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type Roles @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  name: UserRoleEnum! @column(unique: true)
  description: String
}

type UserRoles @table(key: ["userId", "roleId"]) {
  userId: String! @column(type: "uuid")
  roleId: String! @column(type: "uuid")
  user: Users @column(references: "id")
  role: Roles @column(references: "id")
}

type Contacts @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  fullName: String!
  phone: String @column(unique: true)
  email: String @column(unique: true)
  avatarUrl: String
  origin: String
  notes: String
  status: ContactStatusEnum! @column(default: "NEW")
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type Deals @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  contactId: String! @column(type: "uuid")
  contact: Contacts! @column(references: "id")
  title: String!
  stage: DealStageEnum! @column(default: "NEW_LEAD")
  estimatedValue: Float @column(default: 0)
  closedValue: Float
  assignedToId: String @column(type: "uuid")
  assignedTo: Users @column(references: "id")
  closedAt: Timestamp
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type Conversations @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  contactId: String! @column(type: "uuid")
  contact: Contacts! @column(references: "id")
  channelConnectionId: String! @column(type: "uuid")
  channelConnection: ChannelConnections! @column(references: "id")
  status: ConversationStatusEnum! @column(default: "OPEN")
  assignedToId: String @column(type: "uuid")
  assignedTo: Users @column(references: "id")
  lastMessageSnippet: String
  lastMessageAt: Timestamp
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type Messages @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  conversationId: String! @column(type: "uuid")
  conversation: Conversations! @column(references: "id")
  senderType: MessageSenderTypeEnum!
  senderId: String # Can be userId or contactId
  content: String!
  sentAt: Timestamp! @column(default: "now()")
}

type Quotes @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  dealId: String! @column(type: "uuid")
  deal: Deals! @column(references: "id")
  status: QuoteStatusEnum! @column(default: "DRAFT")
  summary: String
  aiSuggestedValue: Float
  finalValue: Float
  approvedBy: String @column(type: "uuid")
  approver: Users @column(references: "id")
  approvedAt: Timestamp
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type Reservations @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  quoteId: String! @column(type: "uuid", unique: true)
  quote: Quotes! @column(references: "id")
  status: ReservationStatusEnum! @column(default: "PENDING_CONFIRMATION")
  serviceDate: Timestamp!
  notes: String
  confirmedBy: String @column(type: "uuid")
  confirmer: Users @column(references: "id")
  confirmedAt: Timestamp
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type CalendarEvents @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  reservationId: String @column(type: "uuid")
  reservation: Reservations @column(references: "id")
  assignedToId: String @column(type: "uuid")
  assignedTo: Users @column(references: "id")
  title: String!
  description: String
  startTime: Timestamp!
  endTime: Timestamp!
  type: CalendarEventTypeEnum!
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type AuditLogs @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  actor: String!
  actorType: AuditActorTypeEnum!
  eventType: String!
  entityType: String!
  entityId: String!
  source: String
  notes: String
  before: JSON
  after: JSON
  timestamp: Timestamp! @column(default: "now()")
}

type KnowledgeBaseArticles @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  title: String!
  category: String!
  summary: String
  content: String!
  status: KnowledgeBaseStatusEnum! @column(default: "DRAFT")
  isEligibleForAI: Boolean! @column(default: false)
  authorId: String! @column(type: "uuid")
  author: Users! @column(references: "id")
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

# -------------------------------------
# SETTINGS & CONFIGURATION TABLES
# -------------------------------------

type AISettings @table(key: "id") {
  id: Int!
  mode: AIModeEnum! @column(default: "OFF")
  isManualFinalizationRequired: Boolean! @column(default: true)
  updatedAt: Timestamp! @column(default: "now()")
}

type ActivationKeys @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  keyHash: String! @column(unique: true)
  description: String
  status: ActivationKeyStatusEnum! @column(default: "INACTIVE")
  createdAt: Timestamp! @column(default: "now()")
}

type ChannelAccounts @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  name: String!
  type: ChannelTypeEnum!
  # External identifiers, e.g., WhatsApp Phone Number ID
  externalId: String
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}

type ChannelConnections @table(key: "id") {
  id: String! @column(type: "uuid", default: "gen_random_uuid()")
  channelAccountId: String! @column(type: "uuid")
  channelAccount: ChannelAccounts! @column(references: "id")
  status: ChannelConnectionStatusEnum! @column(default: "NOT_CONFIGURED")
  aiEnabled: Boolean! @column(default: false)
  lastError: String
  lastCheckedAt: Timestamp
  createdAt: Timestamp! @column(default: "now()")
  updatedAt: Timestamp! @column(default: "now()")
}
