# GraphQL schema for Renascer Transfer Tour
# This schema defines the data model for the application's backend,
# leveraging Firebase Data Connect with a PostgreSQL database.

# --- ENUMS ---
# Defines standardized status values used across different entities.

enum UserRoleEnum {
  ADMIN
  AGENT
  VIEWER
}

enum ChannelTypeEnum {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
}

enum ChannelStatusEnum {
  CONNECTED
  DISCONNECTED
  PENDING
  AWAITING_QR
  FAILING
  MOCK
}

enum DealStageEnum {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  UNCONFIRMED
  AWAITING_CLOSURE
  CLOSED_WON
  CLOSED_LOST
  CANCELED
}

enum ConversationStatusEnum {
  OPEN
  CLOSED
  PENDING
  AWAITING_HUMAN
  IA_ASSISTED
}

enum QuoteStatusEnum {
  DRAFT
  REVIEW_PENDING
  SENT
  APPROVED
  REJECTED
  CANCELED
}

enum ReservationStatusEnum {
  PENDING_CONFIRMATION
  CONFIRMED
  RESCHEDULED
  COMPLETED
  CANCELED
}

enum ActorTypeEnum {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

# --- TABLES (Types with @table directive) ---
# These types map directly to tables in the PostgreSQL database.

type Users @table(key: "userId") {
  userId: String! @db(default: "uuid_generate_v4()")
  fullName: String
  email: String! @unique
  avatarUrl: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
  roles: [UserRoles]
}

type Roles @table(key: "roleId") {
  roleId: String! @db(default: "uuid_generate_v4()")
  roleName: UserRoleEnum! @unique
  users: [UserRoles]
}

type UserRoles @table(key: ["userId", "roleId"]) {
  userId: String!
  roleId: String!
  user: Users! @foreignKey(references: "userId")
  role: Roles! @foreignKey(references: "roleId")
}

type Contacts @table(key: "contactId") {
  contactId: String! @db(default: "uuid_generate_v4()")
  fullName: String!
  phone: String @unique
  email: String @unique
  originChannel: String
  notes: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type Deals @table(key: "dealId") {
  dealId: String! @db(default: "uuid_generate_v4()")
  contactId: String!
  contact: Contacts! @foreignKey(references: "contactId")
  title: String!
  stage: DealStageEnum!
  estimatedValue: Float
  assignedToUserId: String
  assignedTo: Users @foreignKey(references: "userId")
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type Conversations @table(key: "conversationId") {
  conversationId: String! @db(default: "uuid_generate_v4()")
  contactId: String!
  contact: Contacts! @foreignKey(references: "contactId")
  channelId: String!
  channel: ChannelConnections! @foreignKey(references: "connectionId")
  status: ConversationStatusEnum!
  humanOwnerId: String
  owner: Users @foreignKey(references: "userId")
  lastMessageSnippet: String
  lastMessageAt: Timestamp
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type Messages @table(key: "messageId") {
  messageId: String! @db(default: "uuid_generate_v4()")
  conversationId: String!
  conversation: Conversations! @foreignKey(references: "conversationId")
  senderType: ActorTypeEnum!
  content: String!
  createdAt: Timestamp! @db(default: "now()")
}

type Quotes @table(key: "quoteId") {
  quoteId: String! @db(default: "uuid_generate_v4()")
  dealId: String!
  deal: Deals! @foreignKey(references: "dealId")
  status: QuoteStatusEnum!
  summary: String
  aiSuggestedValue: Float
  finalApprovedValue: Float
  approvedByUserId: String
  approvedBy: Users @foreignKey(references: "userId")
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type Reservations @table(key: "reservationId") {
  reservationId: String! @db(default: "uuid_generate_v4()")
  quoteId: String!
  quote: Quotes! @foreignKey(references: "quoteId")
  status: ReservationStatusEnum!
  confirmedByUserId: String
  confirmedBy: Users @foreignKey(references: "userId")
  serviceDate: Timestamp!
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type CalendarEvents @table(key: "eventId") {
  eventId: String! @db(default: "uuid_generate_v4()")
  reservationId: String
  reservation: Reservations @foreignKey(references: "reservationId")
  title: String!
  startTime: Timestamp!
  endTime: Timestamp!
  assignedToUserId: String
  assignedTo: Users @foreignKey(references: "userId")
  createdAt: Timestamp! @db(default: "now()")
}

type AuditLogs @table(key: "logId") {
  logId: String! @db(default: "uuid_generate_v4()")
  actorType: ActorTypeEnum!
  actorId: String # Can be userId, contactId, or system
  eventType: String!
  entityType: String!
  entityId: String!
  details: String
  source: String
  timestamp: Timestamp! @db(default: "now()")
}

type KnowledgeBaseArticles @table(key: "articleId") {
  articleId: String! @db(default: "uuid_generate_v4()")
  title: String!
  category: String!
  summary: String
  content: String!
  status: String!
  isEligibleForAI: Boolean! @db(default: "false")
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}

type AISettings @table(key: "settingsId") {
  settingsId: Int! @db(default: "1")
  mode: String! @db(default: "'assisted'")
  isCommercialActivationAuthorized: Boolean! @db(default: "false")
  isHumanApprovalRequired: Boolean! @db(default: "true")
  updatedAt: Timestamp! @db(default: "now()")
}

type ActivationKeys @table(key: "keyId") {
  keyId: String! @db(default: "uuid_generate_v4()")
  keyType: String! # e.g., 'COMMERCIAL_ACTIVATION'
  keyValue: String! @unique
  isActive: Boolean! @db(default: "false")
  expiresAt: Timestamp
  createdAt: Timestamp! @db(default: "now()")
}

type ChannelAccounts @table(key: "accountId") {
  accountId: String! @db(default: "uuid_generate_v4()")
  accountName: String! # e.g., 'Renascer WhatsApp Business'
  channelType: ChannelTypeEnum!
  createdAt: Timestamp! @db(default: "now()")
}

type ChannelConnections @table(key: "connectionId") {
  connectionId: String! @db(default: "uuid_generate_v4()")
  accountId: String!
  account: ChannelAccounts! @foreignKey(references: "accountId")
  status: ChannelStatusEnum!
  aiEnabled: Boolean! @db(default: "true")
  lastChecked: Timestamp
  lastError: String
  createdAt: Timestamp! @db(default: "now()")
  updatedAt: Timestamp! @db(default: "now()")
}
