# Base User and Auth entities
type Users @table(key: "uid") {
  uid: String!
  email: String
  displayName: String
  photoURL: String
  disabled: Boolean! @default(value: false)
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  roles: [UserRoles]
}

type Roles @table(key: "id") {
  id: String!
  name: String! @unique
  description: String
  userRoles: [UserRoles]
}

type UserRoles @table(key: "id") {
  id: String!
  user: Users! @foreignKey(references: "uid")
  role: Roles! @foreignKey(references: "id")
}

# Core Operational Entities
type Contacts @table(key: "id") {
  id: String!
  fullName: String!
  phone: String
  email: String
  originChannel: String
  notes: String
  status: String # e.g., 'active', 'archived', 'blocked'
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  deals: [Deals]
  conversations: [Conversations]
}

enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  AWAITING_ACTION
  CLOSED_WON
  CLOSED_LOST
  CANCELED
}

type Deals @table(key: "id") {
  id: String!
  contact: Contacts! @foreignKey(references: "id")
  title: String!
  stage: DealStage! @default(value: "NEW_LEAD")
  estimatedValue: Float! @default(value: 0)
  assignedTo: Users @foreignKey(references: "uid")
  approvedBy: Users @foreignKey(references: "uid")
  nextAction: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  quote: Quotes
}

enum ConversationStatus {
  OPEN
  CLOSED
  PENDING
  AWAITING_HUMAN
  IA_ASSISTED
}

type Conversations @table(key: "id") {
  id: String!
  contact: Contacts! @foreignKey(references: "id")
  channel: ChannelConnections! @foreignKey(references: "id")
  status: ConversationStatus! @default(value: "OPEN")
  assignedTo: Users @foreignKey(references: "uid")
  lastMessageSummary: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  messages: [Messages]
}

enum SenderType {
  USER
  AGENT
  AI
  SYSTEM
}

type Messages @table(key: "id") {
  id: String!
  conversation: Conversations! @foreignKey(references: "id")
  senderType: SenderType!
  content: String!
  createdAt: Timestamp! @default(value: "now()")
}

enum QuoteStatus {
  DRAFT
  SENT
  APPROVED
  REJECTED
  CANCELED
}

type Quotes @table(key: "id") {
  id: String!
  deal: Deals! @foreignKey(references: "id")
  origin: String
  destination: String
  serviceDate: Timestamp
  serviceTime: String
  passengers: Int
  bags: Int
  aiSuggestedValue: Float
  finalApprovedValue: Float
  status: QuoteStatus! @default(value: "DRAFT")
  approvedBy: Users @foreignKey(references: "uid")
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  reservation: Reservations
}

enum ReservationStatus {
  PENDING_CONFIRMATION
  CONFIRMED
  COMPLETED
  CANCELED
}

type Reservations @table(key: "id") {
  id: String!
  quote: Quotes! @foreignKey(references: "id")
  status: ReservationStatus! @default(value: "PENDING_CONFIRMATION")
  serviceDate: Timestamp!
  serviceTime: String!
  confirmedBy: Users @foreignKey(references: "uid")
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  calendarEvent: CalendarEvents
}

type CalendarEvents @table(key: "id") {
  id: String!
  reservation: Reservations! @foreignKey(references: "id")
  title: String!
  start: Timestamp!
  end: Timestamp!
  status: String # e.g., 'confirmed', 'tentative'
  assignedTo: Users @foreignKey(references: "uid")
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

# Settings and Logs
enum ActorType {
  HUMAN
  AI
  SYSTEM
  CUSTOMER
}

type AuditLogs @table(key: "id") {
  id: String!
  actor: String! # Could be user uid or customer name
  actorType: ActorType!
  eventType: String!
  entityType: String!
  entityId: String!
  source: String
  notes: String
  before: JSON
  after: JSON
  createdAt: Timestamp! @default(value: "now()")
}

type KnowledgeBaseArticles @table(key: "id") {
  id: String!
  title: String!
  category: String!
  summary: String
  content: String!
  status: String! # e.g., 'draft', 'published', 'archived'
  isEligibleForAI: Boolean! @default(value: false)
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

enum AIMode {
  OFF
  ASSISTED
  AUTONOMOUS
}

type AISettings @table(key: "id") {
  id: String! # Singleton
  mode: AIMode! @default(value: "ASSISTED")
  manualFinalizationRequired: Boolean! @default(value: true)
  activationStatus: String # e.g., 'active', 'inactive'
  providerStatus: String # e.g., 'ok', 'degraded'
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type ActivationKeys @table(key: "id") {
  id: String!
  keyHash: String! @unique
  description: String
  isActive: Boolean! @default(value: false)
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type ChannelAccounts @table(key: "id") {
  id: String!
  type: String! # e.g., 'whatsapp', 'instagram'
  accountId: String! @unique # e.g., phone number, page ID
  displayName: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  connections: [ChannelConnections]
}

enum ChannelStatus {
  NOT_CONFIGURED
  CONNECTED
  DISCONNECTED
  FAILING
  MOCK
}

type ChannelConnections @table(key: "id") {
  id: String!
  account: ChannelAccounts! @foreignKey(references: "id")
  status: ChannelStatus! @default(value: "NOT_CONFIGURED")
  aiEnabled: Boolean! @default(value: false)
  lastChecked: Timestamp
  lastError: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  conversations: [Conversations]
}
