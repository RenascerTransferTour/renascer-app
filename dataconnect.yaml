# Firebase Data Connect configuration
# https://firebase.google.com/docs/data-connect

# The version of the Data Connect schema.
schemaVersion: 1

# The location of the GraphQL schema file.
schemaFile: dataconnect.schema.gql

# Configuration for connectors, which connect to data sources.
connectors:
  - id: 'postgres-connector'
    # The type of the data source. Currently, only 'postgres' is supported.
    type: 'postgres'
    # The configuration for the PostgreSQL connector.
    # The database name will be provisioned by Firebase.
    # The connection string will be provided by environment variable at runtime.
    config:
      database: '${db.name}'
      connectionUri: 'postgresql://${db.user}:${db.password}@${db.host}:${db.port}/${db.name}?sslmode=require'

# Defines how Data Connect maps GraphQL types and fields to the database.
# We will use the default mapping, which is sufficient for this schema.
# customMappings: ...
