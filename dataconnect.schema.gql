
type Users @table(name: "users") {
  id: ID! @custom(type: "uuid")
  externalId: String @unique
  email: String @unique
  fullName: String
  avatarUrl: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  roles: [UserRoles!] @relationship(field: "user")
}

type Roles @table(name: "roles") {
  id: ID! @custom(type: "uuid")
  name: String! @unique # e.g., 'admin', 'agent'
  description: String
  users: [UserRoles!] @relationship(field: "role")
}

type UserRoles @table(name: "user_roles") {
  userId: ID! @custom(type: "uuid")
  roleId: ID! @custom(type: "uuid")
  user: Users! @foreignKey(field: "userId")
  role: Roles! @foreignKey(field: "roleId")
}

type Contacts @table(name: "contacts") {
  id: ID! @custom(type: "uuid")
  fullName: String!
  phone: String
  email: String
  avatarUrl: String
  originChannel: String
  notes: String
  status: String # e.g., 'active', 'archived'
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  deals: [Deals!] @relationship(field: "contact")
  conversations: [Conversations!] @relationship(field: "contact")
}

type Deals @table(name: "deals") {
  id: ID! @custom(type: "uuid")
  contactId: ID! @custom(type: "uuid")
  contact: Contacts! @foreignKey(field: "contactId")
  title: String!
  stage: String! # e.g., 'new-lead', 'qualified', 'quote-sent'
  estimatedValue: Float
  status: String! # e.g., 'open', 'won', 'lost'
  assignedToId: ID @custom(type: "uuid") # Can be a User or 'IA'
  assignedTo: Users @foreignKey(field: "assignedToId")
  approvedById: ID @custom(type: "uuid")
  approvedBy: Users @foreignKey(field: "approvedById")
  nextAction: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type Conversations @table(name: "conversations") {
  id: ID! @custom(type: "uuid")
  contactId: ID! @custom(type: "uuid")
  contact: Contacts! @foreignKey(field: "contactId")
  channelId: ID! @custom(type: "uuid")
  channel: ChannelConnections! @foreignKey(field: "channelId")
  status: String! # e.g., 'open', 'closed', 'pending'
  assignedToId: ID @custom(type: "uuid")
  assignedTo: Users @foreignKey(field: "assignedToId")
  lastMessageSummary: String
  startedAt: Timestamp!
  closedAt: Timestamp
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
  messages: [Messages!] @relationship(field: "conversation")
}

type Messages @table(name: "messages") {
  id: ID! @custom(type: "uuid")
  conversationId: ID! @custom(type: "uuid")
  conversation: Conversations! @foreignKey(field: "conversationId")
  senderType: String! # e.g., 'user', 'agent', 'ai', 'system'
  senderId: String # Can be contactId, userId, or 'system'
  content: String!
  contentType: String! # e.g., 'text', 'image'
  sentAt: Timestamp! @default(value: "now()")
}

type Quotes @table(name: "quotes") {
  id: ID! @custom(type: "uuid")
  dealId: ID! @custom(type: "uuid")
  deal: Deals! @foreignKey(field: "dealId")
  origin: String
  destination: String
  serviceDate: Timestamp
  serviceTime: String
  passengers: Int
  bags: Int
  aiSuggestedValue: Float
  finalApprovedValue: Float
  status: String! # e.g., 'draft', 'sent', 'approved', 'rejected'
  approvedById: ID @custom(type: "uuid")
  approvedBy: Users @foreignKey(field: "approvedById")
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type Reservations @table(name: "reservations") {
  id: ID! @custom(type: "uuid")
  quoteId: ID! @custom(type: "uuid")
  quote: Quotes! @foreignKey(field: "quoteId")
  status: String! # e.g., 'pending', 'confirmed', 'completed', 'canceled'
  confirmedById: ID @custom(type: "uuid") # Can be User or 'IA'
  confirmedBy: Users @foreignKey(field: "confirmedById")
  serviceDate: Timestamp!
  serviceTime: String!
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type CalendarEvents @table(name: "calendar_events") {
  id: ID! @custom(type: "uuid")
  reservationId: ID @custom(type: "uuid")
  reservation: Reservations @foreignKey(field: "reservationId")
  title: String!
  description: String
  startTime: Timestamp!
  endTime: Timestamp!
  assignedToId: ID @custom(type: "uuid")
  assignedTo: Users @foreignKey(field: "assignedToId")
  status: String! # e.g., 'scheduled', 'completed', 'canceled'
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type AuditLogs @table(name: "audit_logs") {
  id: ID! @custom(type: "uuid")
  actor: String!
  actorType: String! # e.g., 'human', 'ai', 'system'
  eventType: String!
  entityType: String!
  entityId: String!
  notes: String
  source: String
  before: JSON
  after: JSON
  createdAt: Timestamp! @default(value: "now()")
}

type KnowledgeBaseArticles @table(name: "knowledge_base_articles") {
  id: ID! @custom(type: "uuid")
  title: String!
  category: String!
  summary: String
  content: String!
  status: String! # e.g., 'draft', 'published', 'archived'
  isEligibleForAI: Boolean! @default(value: "false")
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type AISettings @table(name: "ai_settings") {
  id: ID! @custom(type: "uuid")
  mode: String! # e.g., 'assisted', 'off'
  provider: String # e.g., 'gemini', 'openai'
  manualFinalizationRequired: Boolean! @default(value: "true")
  activationStatus: String! # e.g., 'active', 'inactive'
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type ActivationKeys @table(name: "activation_keys") {
  id: ID! @custom(type: "uuid")
  keyHash: String! @unique
  description: String
  status: String! # e.g., 'active', 'revoked'
  expiresAt: Timestamp
  createdAt: Timestamp! @default(value: "now()")
}

type ChannelAccounts @table(name: "channel_accounts") {
  id: ID! @custom(type: "uuid")
  type: String! # e.g., 'whatsapp', 'instagram'
  accountIdentifier: String! # e.g., phone number, page ID
  displayName: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}

type ChannelConnections @table(name: "channel_connections") {
  id: ID! @custom(type: "uuid")
  channelAccountId: ID! @custom(type: "uuid")
  channelAccount: ChannelAccounts! @foreignKey(field: "channelAccountId")
  status: String! # e.g., 'connected', 'disconnected', 'failing'
  lastChecked: Timestamp
  lastError: String
  createdAt: Timestamp! @default(value: "now()")
  updatedAt: Timestamp! @default(value: "now()")
}
