
"""
Defines the user roles for access control.
"""
enum RoleName {
  ADMIN
  AGENT
  VIEWER
}

"""
Defines the current stage of a deal in the sales pipeline.
"""
enum DealStage {
  NEW_LEAD
  QUALIFIED
  QUOTE_SENT
  NEGOTIATION
  VERBAL_AGREEMENT
  CLOSED_WON
  CLOSED_LOST
  CANCELED
}

"""
Defines the status of a quote.
"""
enum QuoteStatus {
  DRAFT
  SENT
  APPROVED
  REJECTED
  EXPIRED
}

"""
Defines the status of a reservation.
"""
enum ReservationStatus {
  PENDING_CONFIRMATION
  CONFIRMED
  COMPLETED
  CANCELED
  RESCHEDULED
}

"""
Defines the status of a calendar event.
"""
enum CalendarEventStatus {
  SCHEDULED
  IN_PROGRESS
  COMPLETED
  CANCELED
}

"""
Defines the type of a channel connection.
"""
enum ChannelType {
  WHATSAPP
  INSTAGRAM
  FACEBOOK
  WEBSITE
  MANUAL
}

"""
Defines the connection status of a channel.
"""
enum ChannelStatus {
  NOT_CONFIGURED
  CONNECTED
  DISCONNECTED
  AWAITING_QR
  ERROR
  SIMULATED
}

"""
Represents a user of the system, typically an employee.
Linked to Firebase Authentication via the 'uid' field.
"""
type Users @table(name: "users") {
  uid: String! @column(name: "uid", primaryKey: true)
  email: String! @column(name: "email")
  displayName: String @column(name: "display_name")
  photoURL: String @column(name: "photo_url")
  disabled: Boolean! @column(name: "disabled", default: false)
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
  roles: [Roles]! @relationship(through: "UserRoles", from: "user", to: "role")
}

"""
Represents a role that can be assigned to a user.
"""
type Roles @table(name: "roles") {
  roleName: RoleName! @column(name: "role_name", primaryKey: true)
  description: String @column(name: "description")
  users: [Users]! @relationship(through: "UserRoles", from: "role", to: "user")
}

"""
Join table for the many-to-many relationship between Users and Roles.
"""
type UserRoles @table(name: "user_roles") {
  user: Users! @relationship(name: "user")
  role: Roles! @relationship(name: "role")
}

"""
Represents an external contact (customer or lead).
"""
type Contacts @table(name: "contacts") {
  contactId: Int! @column(name: "contact_id", primaryKey: true, identity: true)
  fullName: String! @column(name: "full_name")
  phone: String @column(name: "phone")
  email: String @column(name: "email")
  avatarUrl: String @column(name: "avatar_url")
  originChannel: String @column(name: "origin_channel")
  notes: String @column(name: "notes")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
  deals: [Deals] @relationship(name: "dealsForContact", field: "contactId")
}

"""
Represents a sales opportunity or lead.
"""
type Deals @table(name: "deals") {
  dealId: Int! @column(name: "deal_id", primaryKey: true, identity: true)
  contactId: Contacts! @relationship(name: "contactForDeal", field: "contactId")
  title: String! @column(name: "title")
  stage: DealStage! @column(name: "stage", default: "NEW_LEAD")
  estimatedValue: Float @column(name: "estimated_value")
  finalValue: Float @column(name: "final_value")
  assignedTo: Users @relationship(name: "assignedUser", field: "assignedTo")
  approvedBy: Users @relationship(name: "approvedByUser", field: "approvedBy")
  nextActionAt: Timestamp @column(name: "next_action_at")
  closedAt: Timestamp @column(name: "closed_at")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
  quote: Quotes @relationship(name: "quoteForDeal", field: "dealId")
}

"""
Represents a quote for a service.
"""
type Quotes @table(name: "quotes") {
  quoteId: Int! @column(name: "quote_id", primaryKey: true, identity: true)
  dealId: Deals! @relationship(name: "dealForQuote", field: "dealId")
  status: QuoteStatus! @column(name: "status", default: "DRAFT")
  summary: String @column(name: "summary")
  origin: String @column(name: "origin")
  destination: String @column(name: "destination")
  serviceDate: Timestamp @column(name: "service_date")
  passengers: Int @column(name: "passengers")
  luggageDetails: String @column(name: "luggage_details")
  aiSuggestedValue: Float @column(name: "ai_suggested_value")
  finalApprovedValue: Float @column(name: "final_approved_value")
  approvedBy: Users @relationship(name: "quoteApprovedBy", field: "approvedBy")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
  reservation: Reservations @relationship(name: "reservationForQuote", field: "quoteId")
}

"""
Represents a confirmed booking for a service.
"""
type Reservations @table(name: "reservations") {
  reservationId: Int! @column(name: "reservation_id", primaryKey: true, identity: true)
  quoteId: Quotes! @relationship(name: "quoteForReservation", field: "quoteId")
  status: ReservationStatus! @column(name: "status", default: "PENDING_CONFIRMATION")
  serviceDate: Timestamp! @column(name: "service_date")
  confirmedBy: Users @relationship(name: "reservationConfirmedBy", field: "confirmedBy")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
  calendarEvent: CalendarEvents @relationship(name: "eventForReservation", field: "reservationId")
}

"""
Represents an event in the operational calendar.
"""
type CalendarEvents @table(name: "calendar_events") {
  eventId: Int! @column(name: "event_id", primaryKey: true, identity: true)
  reservationId: Reservations @relationship(name: "reservationForEvent", field: "reservationId")
  title: String! @column(name: "title")
  startTime: Timestamp! @column(name: "start_time")
  endTime: Timestamp! @column(name: "end_time")
  status: CalendarEventStatus! @column(name: "status", default: "SCHEDULED")
  assignedTo: Users @relationship(name: "eventAssignedTo", field: "assignedTo")
  notes: String @column(name: "notes")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

"""
Represents a connection to an external communication channel.
"""
type ChannelConnections @table(name: "channel_connections") {
  channelId: Int! @column(name: "channel_id", primaryKey: true, identity: true)
  type: ChannelType! @column(name: "type")
  displayName: String! @column(name: "display_name")
  status: ChannelStatus! @column(name: "status", default: "NOT_CONFIGURED")
  aiEnabled: Boolean! @column(name: "ai_enabled", default: true)
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

"""
Represents a conversation with a contact through a channel.
"""
type Conversations @table(name: "conversations") {
  conversationId: Int! @column(name: "conversation_id", primaryKey: true, identity: true)
  contactId: Contacts! @relationship(name: "contactForConversation", field: "contactId")
  channelId: ChannelConnections! @relationship(name: "channelForConversation", field: "channelId")
  dealId: Deals @relationship(name: "dealForConversation", field: "dealId")
  status: String! @column(name: "status", default: "OPEN")
  assignedTo: Users @relationship(name: "conversationAssignedTo", field: "assignedTo")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

"""
Represents a single message within a conversation.
"""
type Messages @table(name: "messages") {
  messageId: Int! @column(name: "message_id", primaryKey: true, identity: true)
  conversationId: Conversations! @relationship(name: "conversationForMessage", field: "conversationId")
  senderType: String! @column(name: "sender_type") # e.g., 'user', 'agent', 'ai'
  senderId: String! @column(name: "sender_id")
  content: String! @column(name: "content")
  sentAt: Timestamp! @column(name: "sent_at")
}

"""
Logs important events in the system for auditing purposes.
"""
type AuditLogs @table(name: "audit_logs") {
  logId: Int! @column(name: "log_id", primaryKey: true, identity: true)
  actorType: String! @column(name: "actor_type")
  actorName: String! @column(name: "actor_name")
  eventType: String! @column(name: "event_type")
  entityType: String @column(name: "entity_type")
  entityId: String @column(name: "entity_id")
  notes: String @column(name: "notes")
  source: String @column(name: "source")
  beforeState: JSON @column(name: "before_state")
  afterState: JSON @column(name: "after_state")
  timestamp: Timestamp! @column(name: "timestamp")
}

"""
Stores articles for the internal knowledge base.
"""
type KnowledgeBaseArticles @table(name: "knowledge_base_articles") {
  articleId: Int! @column(name: "article_id", primaryKey: true, identity: true)
  title: String! @column(name: "title")
  category: String! @column(name: "category")
  summary: String @column(name: "summary")
  content: String! @column(name: "content")
  status: String! @column(name: "status", default: "DRAFT")
  isEligibleForAI: Boolean! @column(name: "is_eligible_for_ai", default: false)
  author: Users @relationship(name: "articleAuthor", field: "author")
  createdAt: Timestamp! @column(name: "created_at")
  updatedAt: Timestamp! @column(name: "updated_at")
}

"""
Singleton table for global AI settings.
"""
type AISettings @table(name: "ai_settings") {
  settingsId: Int! @column(name: "settings_id", primaryKey: true, default: 1)
  aiMode: String! @column(name: "ai_mode", default: "ASSISTED")
  manualFinalizationRequired: Boolean! @column(name: "manual_finalization_required", default: true)
  commercialActivationStatus: String! @column(name: "commercial_activation_status", default: "UNAUTHORIZED")
  updatedAt: Timestamp! @column(name: "updated_at")
}
